# .github/workflows/go-ci.yml
name: Go CI

on:
  push:
    branches:
      - main
      - 'feature/*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.17

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Run linter
        run: golangci-lint run

      - name: Build Go binary
        run: go build -o app


